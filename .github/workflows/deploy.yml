name: Deploy to Cloudflare Pages

# Publica dist/ en el proyecto CF Pages `inflapy-com`, que es quien tiene el
# custom domain inflapy.com. Sustituye el deploy a GitHub Pages: publicaba a un
# origen que NADIE sirve (el DNS va a Cloudflare) mientras el dominio servía un
# deployment congelado de hace semanas con datos fabricados. Un dominio = un
# publisher. Diagnóstico: docs/auditoria/CONTROL-MEJORAS.md (2026-07-16).

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  deployments: write

concurrency:
  group: "cf-pages-inflapy-com"
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Historia completa: el sitemap resuelve lastmod real con git log
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install deps
        run: pnpm install --no-frozen-lockfile

      - name: Astro check (gate real, sin '|| true')
        run: pnpm exec astro check

      - name: Build Astro
        run: pnpm build
        env:
          NODE_ENV: production

      # Huella del commit DENTRO del artefacto publicado. El gate final se la
      # pide al dominio: si no la devuelve, el deploy no llegó a producción.
      # Sin punto inicial a propósito (los dotfiles pueden no servirse).
      - name: Sellar build-id
        run: echo "${{ github.sha }}" > dist/build-id.txt

      - uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name=inflapy-com --branch=main --commit-dirty=true

      # ─── GATE REAL: verifica el DOMINIO, no el build ───
      # Un deploy verde solo prueba que el artefacto se subió. NO prueba que el
      # visitante lo vea: el DNS puede apuntar a otro origen. Este dominio
      # sirvió un build congelado con datos fabricados durante semanas, en verde.
      - name: Verificar que el dominio sirve este commit
        run: |
          DOMINIO="inflapy.com"
          for i in $(seq 1 12); do
            sleep 10
            # cache-bust obligatorio: sin él, el edge devuelve el valor viejo y da falso verde
            LIVE=$(curl -fsSL --max-time 15 "https://$DOMINIO/build-id.txt?cb=${RANDOM}${i}" 2>/dev/null | tr -d '[:space:]' || echo "")
            if [ "$LIVE" = "${{ github.sha }}" ]; then
              echo "OK — $DOMINIO sirve ${GITHUB_SHA:0:12}"
              exit 0
            fi
            echo "intento $i/12 — el dominio devuelve '${LIVE:0:12}', esperado '${GITHUB_SHA:0:12}'"
          done
          echo "::error::$DOMINIO NO sirve este build tras 2 min. El deploy fue verde, pero el dominio apunta a otro origen (revisar: custom domain del proyecto Pages, DNS de la zona, y GitHub Pages activo en el repo)."
          exit 1
